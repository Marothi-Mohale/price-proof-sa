name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Restore and build API
        run: dotnet build ./src/PriceProof.Api/PriceProof.Api.csproj -m:1 /nr:false -v minimal

      - name: Run unit tests
        run: dotnet test ./tests/PriceProof.UnitTests/PriceProof.UnitTests.csproj -m:1 /nr:false -v minimal

      - name: Run integration tests
        run: dotnet test ./tests/PriceProof.IntegrationTests/PriceProof.IntegrationTests.csproj -m:1 /nr:false -v minimal

      - name: Install frontend dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./src/frontend
        run: npm test -- --runInBand

      - name: Build frontend
        working-directory: ./src/frontend
        run: npm run build
