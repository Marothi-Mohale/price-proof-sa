name: deploy-production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/PriceProof.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/priceproof-api:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/priceproof-frontend:${{ github.sha }}

      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy-bundle/infra/secrets
          cp docker-compose.yml deploy-bundle/docker-compose.yml
          cp .dockerignore deploy-bundle/.dockerignore
          cp -R docker deploy-bundle/docker
          cp -R src deploy-bundle/src
          printf '%s' '${{ secrets.PRICEPROOF_API_CONFIG_JSON }}' > deploy-bundle/infra/secrets/priceproof.api.json
          printf '%s' '${{ secrets.PRICEPROOF_POSTGRES_PASSWORD }}' > deploy-bundle/infra/secrets/postgres-password.txt

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRICEPROOF_DEPLOY_SSH_KEY }}

      - name: Copy deployment bundle
        run: scp -o StrictHostKeyChecking=no -r deploy-bundle/* ${{ secrets.PRICEPROOF_DEPLOY_HOST }}:${{ secrets.PRICEPROOF_DEPLOY_PATH }}

      - name: Apply deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRICEPROOF_DEPLOY_HOST }} <<'SSH'
          set -eu
          cd "${{ secrets.PRICEPROOF_DEPLOY_PATH }}"
          docker compose pull || true
          docker compose up -d --build
          SSH
