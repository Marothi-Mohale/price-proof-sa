services:
  postgres:
    image: postgres:16-alpine
    container_name: priceproof-postgres
    environment:
      POSTGRES_DB: priceproofsa
      POSTGRES_USER: priceproof
      POSTGRES_PASSWORD: priceproof
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../src/backend
      dockerfile: src/PriceProofSA.Api/Dockerfile
    container_name: priceproof-backend
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=priceproofsa;Username=priceproof;Password=priceproof
      Cors__AllowedOrigins__0: http://localhost:3000
      Storage__Provider: Local
      Storage__LocalRootPath: /app/storage
      Auth__AdminEmails__0: admin@priceproof.local
    ports:
      - "8081:8080"
    volumes:
      - backend-storage:/app/storage

  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
    container_name: priceproof-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8081
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  backend-storage:
